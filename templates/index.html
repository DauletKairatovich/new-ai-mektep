<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI DAPTER | Жоба</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --accent: #6366f1;
            --accent-soft: #eef2ff;
            --bg: #fdfeff;
            --text-main: #0f172a;
            --text-secondary: #64748b;
            --card-bg: rgba(255, 255, 255, 0.8);
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: radial-gradient(circle at top left, #eef2ff 0%, #ffffff 50%, #f5f3ff 100%);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container { 
            background: var(--card-bg); 
            backdrop-filter: blur(10px);
            padding: 50px 40px; 
            border-radius: 32px; 
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.03);
            width: 100%; 
            max-width: 700px; 
            text-align: center;
            margin-top: 40px;
        }

        .badge {
            background: var(--accent-soft);
            color: var(--accent);
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 20px;
            display: inline-block;
        }

        h1 { font-weight: 700; font-size: 32px; margin: 0 0 12px 0; letter-spacing: -0.02em; }
        .description { color: var(--text-secondary); margin-bottom: 40px; font-size: 16px; }

        .upload-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .upload-box {
            background: #fff;
            border: 2px solid #f1f5f9;
            border-radius: 24px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 140px;
        }

        .upload-box:hover { 
            border-color: var(--accent); 
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.1);
        }

        .upload-box strong { font-size: 16px; margin-bottom: 8px; }
        .upload-box span { font-size: 13px; color: var(--text-secondary); }
        .upload-box.active { border-color: #10B981; background: #f0fdf4; }

        button { 
            width: 100%; 
            padding: 18px; 
            background: var(--accent); 
            color: white; 
            border: none; 
            border-radius: 20px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: 700;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        button:hover { 
            background: var(--accent-hover); 
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }

        #result { 
            margin-top: 40px; 
            padding: 30px; 
            border-radius: 24px; 
            background: #fff; 
            text-align: left;
            line-height: 1.8; 
            display: none;
            border: 1px solid #f1f5f9;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        /* Markdown әдемілеу */
        #result h2 { font-size: 20px; color: var(--accent); margin-top: 20px; }
        #result p { margin: 10px 0; }
        #result code { background: #f1f5f9; padding: 2px 6px; border-radius: 6px; }

        .footer {
            margin-top: 60px;
            padding: 30px;
            text-align: center;
            color: var(--text-secondary);
            font-size: 14px;
            width: 100%;
            max-width: 700px;
            border-top: 1px solid rgba(0,0,0,0.05);
        }

        .footer b { color: var(--text-main); display: block; margin-bottom: 4px; }

        .loader {
            display: none;
            margin: 20px auto;
            width: 40px;
            height: 40px;
            border: 4px solid #f1f5f9;
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            animation: spin 0.8s cubic-bezier(0.5, 0, 0.5, 1) infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: #f1f5f9;
            padding: 6px;
            border-radius: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            background: transparent;
            color: var(--text-secondary);
            box-shadow: none;
            border-radius: 16px;
        }

        .tab-btn.active {
            background: #fff;
            color: var(--accent);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .tab-btn:hover {
            transform: none;
            box-shadow: none;
        }
        
        .tab-btn.active:hover {
            transform: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .grade-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .grade-input-group input {
            flex: 1;
            padding: 16px;
            border: 2px solid #f1f5f9;
            border-radius: 16px;
            font-size: 16px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.3s;
        }

        .grade-input-group input:focus {
            border-color: var(--accent);
        }

        .grade-input-group button {
            width: auto;
            padding: 16px 24px;
            background: var(--accent);
            color: white;
            border-radius: 16px;
        }

        .grades-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .grade-badge {
            background: #eef2ff;
            color: var(--accent);
            padding: 8px 16px;
            border-radius: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .grade-badge span {
            cursor: pointer;
            color: #ef4444;
            font-weight: bold;
        }
        
        .chart-container {
            background: #fff;
            padding: 20px;
            border-radius: 24px;
            border: 1px solid #f1f5f9;
            margin-bottom: 20px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="badge">AI Technology 2026</div>
        <h1>AI DAPTER</h1>
        <p class="description">Интеллектуалды білім беру платформасы</p>
        
        <div class="tabs">
            <button class="tab-btn active" id="tab-check" onclick="switchTab('check')">Жұмысты тексеру</button>
            <button class="tab-btn" id="tab-predict" onclick="switchTab('predict')">Үлгерімді болжау</button>
        </div>

        <!-- Тексеру бөлімі -->
        <div id="checkSection">
            <div class="upload-grid">
                <div class="upload-box" id="box1" onclick="document.getElementById('taskInput').click()">
                    <div style="font-size: 30px; margin-bottom: 10px;">📋</div>
                    <strong>Тапсырма шарты</strong>
                    <span id="name1">Суретті жүктеу</span>
                    <input type="file" id="taskInput" accept="image/*" style="display: none;" onchange="updateUI('taskInput', 'name1', 'box1')">
                </div>

                <div class="upload-box" id="box2" onclick="document.getElementById('studentInput').click()">
                    <div style="font-size: 30px; margin-bottom: 10px;">📝</div>
                    <strong>Оқушы жұмысы</strong>
                    <span id="name2">Суретті жүктеу</span>
                    <input type="file" id="studentInput" accept="image/*" style="display: none;" onchange="updateUI('studentInput', 'name2', 'box2')">
                </div>
            </div>

            <button id="submitBtn" onclick="sendFiles()">Жұмысты тексеру</button>
        </div>

        <!-- Болжау бөлімі -->
        <div id="predictSection" style="display: none;">
            <div class="grade-input-group">
                <input type="number" id="gradeInput" min="1" max="10" placeholder="Бағаны енгізіңіз (1-10)">
                <button onclick="addGrade()">Қосу</button>
            </div>
            
            <div class="grades-list" id="gradesList"></div>
            
            <div class="chart-container">
                <canvas id="performanceChart"></canvas>
            </div>

            <button id="predictBtn" onclick="predictPerformance()">Анализ жасау және Болжау</button>
        </div>
        
        <div class="loader" id="loader"></div>
        <div id="result"></div>
    </div>

    <div class="footer">
        <b>Турарбекова Алмагуль курс бойынша алған білімі негізінде дайындалған жобасы</b>
        Тайпақ жалпы орта білім беретін мектебінің информатика пәні мұғалімі
    </div>

    <script>
        let grades = [];
        let chartInstance = null;

        function switchTab(tab) {
            document.getElementById('checkSection').style.display = tab === 'check' ? 'block' : 'none';
            document.getElementById('predictSection').style.display = tab === 'predict' ? 'block' : 'none';
            document.getElementById('tab-check').classList.toggle('active', tab === 'check');
            document.getElementById('tab-predict').classList.toggle('active', tab === 'predict');
            document.getElementById('result').style.display = 'none';
            
            if(tab === 'predict' && grades.length > 0 && !chartInstance) {
                updateChart();
            }
        }

        function updateUI(inputId, spanId, boxId) {
            const file = document.getElementById(inputId).files[0];
            if (file) {
                document.getElementById(spanId).innerText = file.name;
                document.getElementById(boxId).classList.add('active');
            }
        }

        async function sendFiles() {
            const f1 = document.getElementById('taskInput').files[0];
            const f2 = document.getElementById('studentInput').files[0];
            const res = document.getElementById('result');
            const load = document.getElementById('loader');
            const btn = document.getElementById('submitBtn');

            if (!f1 || !f2) { return alert("Екі файлды да таңдаңыз!"); }

            const fd = new FormData();
            fd.append('task_file', f1);
            fd.append('student_file', f2);

            res.style.display = "none";
            load.style.display = "block";
            btn.disabled = true;
            btn.innerText = "ИИ талдау жасауда...";

            try {
                const response = await fetch('/check', { method: 'POST', body: fd });
                const data = await response.json();
                res.style.display = "block";
                res.innerHTML = marked.parse(data.result);
            } catch (e) {
                res.style.display = "block";
                res.innerText = "Қате орын алды. Қайта көріңіз.";
            } finally {
                load.style.display = "none";
                btn.disabled = false;
                btn.innerText = "Жұмысты тексеру";
            }
        }

        function addGrade() {
            const input = document.getElementById('gradeInput');
            const val = parseInt(input.value);
            if (val >= 1 && val <= 10) {
                grades.push(val);
                input.value = '';
                renderGrades();
                updateChart();
            } else {
                alert("Баға 1 мен 10 аралығында болуы керек.");
            }
        }

        function removeGrade(index) {
            grades.splice(index, 1);
            renderGrades();
            updateChart();
        }

        function renderGrades() {
            const list = document.getElementById('gradesList');
            list.innerHTML = '';
            grades.forEach((g, i) => {
                const badge = document.createElement('div');
                badge.className = 'grade-badge';
                badge.innerHTML = `${g} <span onclick="removeGrade(${i})">×</span>`;
                list.appendChild(badge);
            });
        }

        function updateChart() {
            const ctx = document.getElementById('performanceChart').getContext('2d');
            if (chartInstance) { chartInstance.destroy(); }
            
            const labels = grades.map((_, i) => `Сабақ ${i + 1}`);
            
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Бағалар',
                        data: grades,
                        borderColor: '#6366f1',
                        backgroundColor: 'rgba(99, 102, 241, 0.1)',
                        borderWidth: 3,
                        pointBackgroundColor: '#6366f1',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2,
                        pointRadius: 5,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true, max: 10 }
                    },
                    plugins: {
                        legend: { display: false }
                    }
                }
            });
        }

        async function predictPerformance() {
            if (grades.length === 0) { return alert("Алдымен бағаларды енгізіңіз!"); }
            
            const res = document.getElementById('result');
            const load = document.getElementById('loader');
            const btn = document.getElementById('predictBtn');

            res.style.display = "none";
            load.style.display = "block";
            btn.disabled = true;
            btn.innerText = "ИИ талдау жасауда...";

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ grades: grades })
                });
                const data = await response.json();
                res.style.display = "block";
                res.innerHTML = marked.parse(data.result);
            } catch (e) {
                res.style.display = "block";
                res.innerText = "Қате орын алды. Қайта көріңіз.";
            } finally {
                load.style.display = "none";
                btn.disabled = false;
                btn.innerText = "Анализ жасау және Болжау";
            }
        }
    </script>
</body>

</html>
